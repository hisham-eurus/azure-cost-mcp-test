name: Cost Override

# ── Triggers ──────────────────────────────────────────────────────────────────
# When a reviewer adds the 'cost-approved' label to a blocked PR,
# this workflow re-runs the status check and marks it as passing.
on:
  pull_request:
    types: [labeled]

permissions:
  pull-requests: write
  statuses: write

jobs:
  override:
    name: Override Cost Block
    # Only run when the specific label is added
    if: github.event.label.name == 'cost-approved'
    runs-on: ubuntu-latest

    steps:
      - name: Set override status
        uses: actions/github-script@v7
        with:
          script: |
            const actor = context.payload.sender.login;

            // Post a comment recording who approved the override
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## ✅ Cost Override Approved\n\n@${actor} approved the cost increase. The merge block has been lifted.\n\n> ⚠️ The cost will increase beyond the configured threshold once this PR is merged.`,
            });

            // Set the commit status to success so branch protection passes
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.payload.pull_request.head.sha,
              state: 'success',
              context: 'Azure Cost Review',
              description: `Cost override approved by @${actor}`,
              target_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/pull/${context.payload.pull_request.number}`,
            });

            console.log(`Cost override approved by ${actor}`);
